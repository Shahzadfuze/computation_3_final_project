{% extends "base.html" %}
{% block content %}
<div style="max-width:960px; margin:0 auto;">
  <a href="/" class="btn btn-ghost" style="margin-bottom:1.5rem; display:inline-block;">← Back</a>

  <div style="display:grid; grid-template-columns:1fr 300px; gap:1.5rem; align-items:flex-start;">

    <!-- Image preview -->
    <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; overflow:hidden;">
      <div style="background:#111; display:flex; align-items:center; justify-content:center; min-height:400px;">
        <img
          id="preview"
          src="data:image/jpeg;base64,{{ photo.image_b64 }}"
          style="max-width:100%; max-height:520px; object-fit:contain; transition: filter 0.15s;"
        >
      </div>
    </div>

    <!-- Controls -->
    <div style="display:flex; flex-direction:column; gap:1rem;">


      <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:1rem;">
  <p style="font-size:0.8rem; color:#666; margin-bottom:0.5rem;">Rotation</p>

  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem;">
    <button type="button" onclick="setRotation(90)"  class="filter-btn">↺ 90°</button>
    <button type="button" onclick="setRotation(180)" class="filter-btn">180°</button>
    <button type="button" onclick="setRotation(270)" class="filter-btn">↻ 90°</button>
  </div>
</div>

      <!-- Filters -->
      <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:1rem;">
        <p style="font-size:0.8rem; color:#666; margin-bottom:0.5rem;">Filter</p>

        <button onclick="setFilter('none')"  id="filter-none" class="filter-btn">Original</button>
        <button onclick="setFilter('bw')"    id="filter-bw"   class="filter-btn">B&W</button>
        <button onclick="setFilter('sepia')" id="filter-sepia"class="filter-btn">Sepia</button>
        <button onclick="setFilter('blur')"  id="filter-blur" class="filter-btn">Blur</button>
        <button onclick="setFilter('random')" id="filter-random" class="filter-btn">Random</button>
      </div>

      <!-- Sliders -->
      <div style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:1rem;">
        <p style="font-size:0.8rem; color:#666;">Adjustments</p>

        <label>Brightness</label>
        <input type="range" id="brightness" min="0.2" max="3" step="0.05" value="1" oninput="updatePreview()">

        <label>Contrast</label>
        <input type="range" id="contrast" min="0.2" max="3" step="0.05" value="1" oninput="updatePreview()">

        <label>Saturation</label>
        <input type="range" id="saturation" min="0" max="3" step="0.05" value="1" oninput="updatePreview()">
      </div>

      <!-- Save -->
      <form action="/photo/{{ photo._id }}/save_edits" method="POST">
        <input type="hidden" name="brightness" id="f-brightness" value="1">
        <input type="hidden" name="contrast"   id="f-contrast"   value="1">
        <input type="hidden" name="saturation" id="f-saturation" value="1">
        <input type="hidden" name="filter"     id="f-filter"     value="none">
        <input type="hidden" name="rotation"   id="f-rotation"   value ="0">

        <button type="submit" class="btn btn-primary" style="width:100%;">Save edits</button>
      </form>

    </div>
  </div>
</div>

<style>
  .filter-btn {
    display:block;
    width:100%;
    margin-bottom:0.4rem;
    padding:0.5rem;
    border-radius:6px;
    border:1px solid #333;
    background:#222;
    color:#aaa;
    cursor:pointer;
  }
  .filter-btn.active {
    background:#3b82f6;
    color:#fff;
  }
</style>

<script>
  const preview = document.getElementById('preview');
  let activeFilter = 'none';

  function updatePreview() {
    const b = document.getElementById('brightness').value;
    const c = document.getElementById('contrast').value;
    const s = document.getElementById('saturation').value;

    document.getElementById('f-brightness').value = b;
    document.getElementById('f-contrast').value = c;
    document.getElementById('f-saturation').value = s;

    let css = `brightness(${b}) contrast(${c}) saturate(${s})`;

    if (activeFilter === 'bw') css += ' grayscale(1)';
    if (activeFilter === 'sepia') css += ' sepia(1)';
    if (activeFilter === 'blur') css += ' blur(5px)';
    if (activeFilter === 'random') css += ' contrast(1.3) saturate(1.5) hue-rotate(20deg)';

    preview.style.filter = css;
  }

  let activeRotation = 0;

function setRotation(deg) {
  activeRotation = (activeRotation === deg) ? 0 : deg;

  document.getElementById('f-rotation').value = activeRotation;

  preview.style.transform = `rotate(${activeRotation}deg)`;
}


  function setFilter(name) {
    activeFilter = name;
    document.getElementById('f-filter').value = name;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('filter-' + name);
    if (btn) btn.classList.add('active');

    updatePreview();
  }

  updatePreview();
</script>
{% endblock %}
